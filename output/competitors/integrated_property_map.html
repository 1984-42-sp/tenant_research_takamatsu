<!DOCTYPE html>
<html>
<head>
    
    <meta http-equiv="content-type" content="text/html; charset=UTF-8" />
    
<style>
* {
  box-sizing: border-box;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}

.leaflet-container {
  background: #f7f2ea;
}

.suumo-like-topbar {
  position: fixed;
  z-index: 9999;
  top: 0;
  left: 0;
  right: 0;
  min-height: 78px;
  background: rgba(255, 255, 255, 0.96);
  border-bottom: 3px solid #66ad31;
  display: grid;
  grid-template-columns: 300px 1fr;
  box-shadow: 0 4px 18px rgba(0,0,0,0.14);
  backdrop-filter: blur(10px);
}

.topbar-brand-block {
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 14px 22px;
  border-right: 1px solid #e5dfd6;
  background: #fff;
}

.brand {
  color: #31261e;
  font-size: 18px;
  font-weight: 900;
  letter-spacing: 0.01em;
}

.subtitle {
  font-size: 11px;
  color: #7f6b5a;
  margin-top: 4px;
  font-weight: 700;
}

.topbar-nav-block {
  display: grid;
  grid-template-columns: 120px 120px 1fr;
  min-width: 0;
}

.topbar-filter-block {
  min-width: 0;
  padding: 11px 14px 9px;
  border-right: 1px solid #e5dfd6;
  text-align: center;
}

.topbar-filter-title {
  color: #4f9d28;
  font-size: 12px;
  font-weight: 900;
  margin-bottom: 5px;
  white-space: nowrap;
}

.topbar-filter-value {
  color: #2f241b;
  font-size: 16px;
  font-weight: 900;
}

.topbar-pattern-block {
  text-align: left;
  overflow: hidden;
}

.pattern-strip {
  display: flex;
  align-items: center;
  gap: 7px;
  overflow-x: auto;
  padding: 2px 2px 6px;
  scrollbar-width: thin;
}

.pattern-chip {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  flex: 0 0 auto;
  max-width: 160px;
  padding: 5px 8px;
  border-radius: 999px;
  background: #f7f2ea;
  border: 1px solid #e4d7c6;
  color: #34281f;
  font-size: 11px;
  font-weight: 800;
  white-space: nowrap;
}

.pattern-chip-label {
  overflow: hidden;
  text-overflow: ellipsis;
}

.legend-dot {
  width: 10px;
  height: 10px;
  flex: 0 0 auto;
  border-radius: 50%;
  box-shadow: 0 0 0 2px rgba(0,0,0,0.06);
}

.competitor-panel,
.side-panel {
  display: none;
  position: fixed;
  z-index: 10000;
  top: 104px;
  bottom: 0;
  height: calc(100% - 104px);
  max-height: none;
  background: rgba(255,255,255,0.97);
  box-shadow: 1px 4px 12px 2px rgba(0,0,0,0.18);
  overflow-y: auto;
  backdrop-filter: blur(12px);
}

.competitor-panel {
  left: 0;
  right: auto;
  width: 300px;
  border-radius: 0 18px 18px 0;
}

.side-panel {
  left: auto;
  right: 0;
  width: 360px;
  border-radius: 18px 0 0 18px;
  box-shadow: -1px 4px 12px 2px rgba(0,0,0,0.18);
}

.panel-empty {
  padding: 28px;
  color: #4a4037;
  line-height: 1.8;
}

.panel-empty h2 {
  font-size: 17px;
  margin: 0 0 10px;
  color: #2d241c;
}

.close-panel-btn {
  position: absolute;
  top: 12px;
  right: 12px;
  width: 34px;
  height: 34px;
  border: none;
  border-radius: 50%;
  background: rgba(255,255,255,0.25);
  color: white;
  cursor: pointer;
  font-size: 18px;
  font-weight: 700;
  transition: .2s;
}

.close-panel-btn:hover {
  background: rgba(255,255,255,0.45);
}

.panel-header {
  position: relative;
  background: var(--accent-color, #2d2016);
  color: white;
  border-radius: 18px;
  padding: 18px 54px 18px 18px;
  margin: 18px 18px 16px;
  box-shadow: 0 10px 24px rgba(0,0,0,0.16);
}

.panel-title {
  margin: 0;
  color: white;
  font-size: 20px;
  line-height: 1.35;
}

.panel-address {
  color: rgba(255,255,255,0.88);
  font-size: 12px;
  line-height: 1.6;
  margin-top: 6px;
}

.panel-body {
  padding: 0 18px 22px;
}

.badges {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin: 14px 0 18px;
}

.property-badge {
  display: inline-block;
  padding: 6px 10px;
  border-radius: 999px;
  font-size: 12px;
  font-weight: 800;
  line-height: 1.2;
  color: #111 !important;
  background: #f3eadc !important;
  border: 1px solid #c9ab85;
}

.property-badge-pattern {
  color: #fff !important;
  background: var(--accent-color, #2d2016) !important;
  border: none;
}

.info-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin: 18px 0;
}

.info-card {
  background: #fbf8f3;
  border: 1px solid #eee4d8;
  border-top: 4px solid var(--accent-color, #2d2016);
  border-radius: 14px;
  padding: 12px;
}

.info-label {
  font-size: 11px;
  color: #5f5146;
  font-weight: 700;
  margin-bottom: 5px;
}

.info-value {
  font-size: 15px;
  font-weight: 800;
  color: #1f1712;
}

.section-title {
  margin: 22px 0 10px;
  font-size: 15px;
  color: var(--accent-color);
}

.comment-box {
  background: #fff7e8;
  border: 1px solid #d7bea0;
  border-radius: 14px;
  padding: 13px;
  line-height: 1.7;
  color: #332820;
  font-size: 13px;
}

.link-button {
  display: block;
  padding: 10px 12px;
  margin-top: 8px;
  border-left: 4px solid var(--accent-color);
  background: rgba(0,0,0,0.03);
  border-radius: 8px;
  color: #222 !important;
  text-decoration: none;
  font-weight: 700;
}

.link-button:hover {
  text-decoration: underline;
}

.link-primary {
  background: transparent;
  color: #1f1f1f !important;
  border: none;
  box-shadow: none;
}

.link-secondary {
  background: transparent;
  color: #1f1f1f !important;
  border: none;
  box-shadow: none;
}

.leaflet-control-zoom {
  margin-top: 96px !important;
}

.competitor-coffee-icon {
  background: transparent !important;
  border: none !important;
}

.competitor-marker-inner {
  width: 18px;
  height: 18px;
  border-radius: 50%;
  background: rgba(185, 28, 28, 0.70);
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  font-size: 10px;
  box-shadow: 0 1px 3px rgba(0,0,0,.15);
  border: 1px solid rgba(255,255,255,0.8);
}

@media (max-width: 1100px) {
  .suumo-like-topbar {
    grid-template-columns: 260px 1fr;
  }

  .topbar-nav-block {
    grid-template-columns: 105px 105px 1fr;
  }

  .competitor-panel {
    width: 280px;
  }

  .side-panel {
    width: 330px;
  }
}

@media (max-width: 900px) {
  .suumo-like-topbar {
    min-height: 76px;
    grid-template-columns: 1fr;
  }

  .topbar-brand-block {
    padding: 10px 14px 4px;
    border-right: none;
  }

  .brand {
    font-size: 15px;
  }

  .subtitle {
    font-size: 10px;
  }

  .topbar-nav-block {
    grid-template-columns: 82px 82px 1fr;
  }

  .topbar-filter-block {
    padding: 6px 8px;
  }

  .topbar-filter-title {
    font-size: 10px;
  }

  .topbar-filter-value {
    font-size: 13px;
  }

  .pattern-chip {
    font-size: 10px;
    max-width: 120px;
    padding: 4px 7px;
  }

  .competitor-panel {
    top: 96px;
    left: 0;
    right: 0;
    bottom: auto;
    width: 100%;
    height: auto;
    max-height: 32vh;
    border-radius: 0 0 18px 18px;
  }

  .side-panel {
    top: auto;
    left: 0;
    right: 0;
    bottom: 0;
    width: 100%;
    height: auto;
    max-height: 42vh;
    border-radius: 18px 18px 0 0;
  }

  .leaflet-control-zoom {
    margin-top: 126px !important;
  }
}
